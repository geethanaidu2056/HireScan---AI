<!DOCTYPE html>
<html>
<head>
    <title>ATS Resume Builder</title>
</head>

<body style="font-family:Arial;background:#f4f6f9;padding:20px;">

<h1>🧠 ATS Resume Builder</h1>

<form action="/generate" method="POST">

    <input name="name" placeholder="Full Name" required><br><br>

    <input name="email" placeholder="Email"><br><br>

    <input name="phone" placeholder="Phone"><br><br>

    <textarea name="skills" placeholder="Skills (comma separated)"></textarea><br><br>

    <textarea name="projects" placeholder="Projects"></textarea><br><br>

    <button type="submit">Generate ATS Resume</button>

</form>

</body>
</html>
